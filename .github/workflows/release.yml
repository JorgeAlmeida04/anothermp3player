name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Build fat JAR
        run: ./mvnw.cmd clean package

      - name: Create app-image
        run: ./mvnw.cmd jpackage:jpackage

      - name: Zip app-image
        run: Compress-Archive -Path target/installer/AnotherMP3Player -DestinationPath target/AnotherMP3Player-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/AnotherMP3Player-windows.zip